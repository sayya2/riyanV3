name: Build and Deploy (production)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/sayya2/riyanwebsite

jobs:
  build-and-push:
    runs-on: [self-hosted, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:cache,mode=max

  deploy:
    runs-on: [self-hosted, prod]
    needs: build-and-push
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy on Lightsail
        run: |
          set -e
          REPO_DIR="/opt/riyan/app"
          if [ ! -d "$REPO_DIR" ]; then
            echo "Repo not found at $REPO_DIR" >&2
            exit 1
          fi
          git -C "$REPO_DIR" fetch origin main
          git -C "$REPO_DIR" checkout main
          git -C "$REPO_DIR" reset --hard origin/main
          if command -v npm >/dev/null 2>&1; then
            bash "$REPO_DIR/scripts/install-directus-extensions.sh" \
              "$REPO_DIR/directus/extensions"
          else
            docker run --rm \
              -u "$(id -u):$(id -g)" \
              -v "$REPO_DIR:/repo" \
              -w /repo \
              node:22-bookworm-slim \
              bash /repo/scripts/install-directus-extensions.sh \
              /repo/directus/extensions
          fi
          rm -rf "$REPO_DIR/directus/extensions/.registry"
          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            DC="docker-compose"
          else
            echo "docker compose not available on runner" >&2
            exit 1
          fi
          $DC -f "$REPO_DIR/docker-compose.prod.yml" --env-file "$REPO_DIR/.env.prod" pull web
          $DC -f "$REPO_DIR/docker-compose.prod.yml" --env-file "$REPO_DIR/.env.prod" up -d --force-recreate directus
          $DC -f "$REPO_DIR/docker-compose.prod.yml" --env-file "$REPO_DIR/.env.prod" up -d
