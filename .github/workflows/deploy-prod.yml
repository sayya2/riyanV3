name: Build and Deploy (production)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/sayya2/riyanwebsite

jobs:
  build-and-push:
    runs-on: [self-hosted, prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: [self-hosted, prod]
    needs: build-and-push

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy on Production
        run: |
          set -e
          REPO_DIR="/var/www/riyan"

          if [ ! -d "$REPO_DIR" ]; then
            echo "Repo not found at $REPO_DIR" >&2
            exit 1
          fi

          git -C "$REPO_DIR" fetch origin main
          git -C "$REPO_DIR" checkout main
          git -C "$REPO_DIR" reset --hard origin/main

          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            DC="docker-compose"
          else
            echo "docker compose not available on runner" >&2
            exit 1
          fi

          $DC -f "$REPO_DIR/docker-compose.prod.yml" --env-file "$REPO_DIR/.env.prod" pull
          $DC -f "$REPO_DIR/docker-compose.prod.yml" --env-file "$REPO_DIR/.env.prod" up -d --force-recreate
