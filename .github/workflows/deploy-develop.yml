name: Build and Deploy (develop)

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/sayya2/riyanwebsite

jobs:
  build-and-push:
    runs-on: [self-hosted, dev]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:develop
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: [self-hosted, dev]
    needs: build-and-push
    steps:
      - name: Deploy on Pi
        run: |
          set -e
          REPO_DIR="/data/projects/riyan"
          if [ ! -d "$REPO_DIR" ]; then
            echo "Repo not found at $REPO_DIR" >&2
            exit 1
          fi
          git -C "$REPO_DIR" fetch origin develop
          git -C "$REPO_DIR" checkout develop
          git -C "$REPO_DIR" pull --ff-only origin develop
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            DC="docker-compose"
          else
            echo "docker compose not available on runner" >&2
            exit 1
          fi
          $DC -f "$REPO_DIR/docker-compose.pi.yml" --env-file "$REPO_DIR/.env.pi" pull web
          $DC -f "$REPO_DIR/docker-compose.pi.yml" --env-file "$REPO_DIR/.env.pi" up -d
