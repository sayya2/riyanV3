name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Lightsail
        run: |
          cd /home/ubuntu/RiyanSite
          git pull origin main
          npm install
          pm2 restart all
